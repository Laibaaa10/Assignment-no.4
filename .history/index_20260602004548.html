<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PearlyLoops</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <nav class="navbar">
    <div class="logo">
      <img src="./images/pearlyloops logo.jpg" alt="Crochet">
      <h2>PearlyLoops</h2>
    </div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="left-side">
      <div class="big-circle"></div>
      <div class="small-circle"></div>
      <div class="dots"></div>

      <img class="crochet-img"
      src="./images/pearlyloops logo.jpg"
      alt="crochet toy">

    </div>
    <div class="right-side">

      <h3>HANDMADE</h3>

      <h1>CROCHET <br> CREATIONS</h1>

      <p>
        Cute handmade crochet toys, flowers, keychains
        and accessories made with love and creativity.
      </p>

      <button>
        <i class="shopping"></i>
        SHOP NOW
      </button>

    </div>

  </section>

  <section class="products">

    <div class="category">
        <h2>CASUAL SHOES</h2>

        <div class="card-container">

            <div class="card">
                <img src="shoe1.png">
                <h3>Nike Shoe</h3>
                <p>Lorem ipsum text...</p>

                <div class="price-row">
                    <span>$234</span>
                    <button>BUY NOW</button>
                </div>
            </div>

            <div class="card">
                <img src="shoe2.png">
                <h3>Sneakers Skate Shoe</h3>
                <p>Lorem ipsum text...</p>

                <div class="price-row">
                    <span>$234</span>
                    <button>BUY NOW</button>
                </div>
            </div>

        </div>
    </div>

</section>

</body>
</html>

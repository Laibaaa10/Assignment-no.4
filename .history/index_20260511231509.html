<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nike React UI</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="style.css" />

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" alt="">
            <h2><span>NIKE</span> REACT</h2>
        </div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Product</a></li>
            <li><a href="#">About us</a></li>
            <li><a href="#">Contact us</a></li>
        </ul>

    </nav>

    <!-- HERO SECTION -->
    <section class="hero">

        <!-- LEFT SIDE -->
        <div class="left-side">

            <div class="circle"></div>

            <div class="small-circle"></div>

            <div class="dots"></div>

            <img class="shoe"
                src="https://pngimg.com/d/running_shoes_PNG5823.png"
                alt="shoe">

        </div>

        <!-- RIGHT SIDE -->
        <div class="right-side">

            <h3>NIKE REACT</h3>

            <h1>INFINITY RUN 2</h1>

            <p>
                The Nike React Infinity Run 2 continues to help
                reduce injury and keep you running.
            </p>

            <button>
                <i class="fa-solid fa-cart-shopping"></i>
                BUY NOW
            </button>

        </div>

    </section>

</body>
</html>

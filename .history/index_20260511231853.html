<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PearlyLoops</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">

    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/8090/8090406.png" alt="">
      <h2>Crochet<span>Heaven</span></h2>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

  </nav>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- LEFT -->
    <div class="left-side">

      <div class="big-circle"></div>
      <div class="small-circle"></div>
      <div class="dots"></div>

      <img class="crochet-img"
      src="https://pngimg.com/d/teddy_bear_PNG55.png"
      alt="crochet toy">

    </div>

    <!-- RIGHT -->
    <div class="right-side">

      <h3>HANDMADE</h3>

      <h1>CROCHET <br> CREATIONS</h1>

      <p>
        Cute handmade crochet toys, flowers, keychains
        and accessories made with love and creativity.
      </p>

      <button>
        <i class="fa-solid fa-bag-shopping"></i>
        SHOP NOW
      </button>

    </div>

  </section>

</body>
</html>
